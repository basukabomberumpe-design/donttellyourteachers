    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>Google</title>
        <link rel="stylesheet" href="../style.css" />
        <script src="../js/customizer.js"></script>
        <link rel="icon" type="image/png" href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico"/>
        <script src="https://kit.fontawesome.com/19b444568b.js" crossorigin="anonymous"></script>
        <script src="/The-Hub/js/panic.js"></script>
        <script src="/The-Hub/js/inject.js"></script>
        
    <body>
        <div id="sub">
            <a href="../index.html" style="margin-left: 10px;"> <i class="fa-regular fa-face-smile"></i> The Hub</a>
            <a href="../sub-sites/games.html"><span><i class="fa-solid fa-gamepad" style="font-size: 30px;"></i> Games</span></a>
            <a href="../sub-sites/links.html"><i class="fa-solid fa-link"></i> Links</a>
            <a href="../sub-sites/media.html"><i class="fa-solid fa-tv"></i> Media</a>
            <a href="./sub-sites/settings.html"> <i class="fa-solid fa-gear"></i> Settings</a>
        </div>
        <div class="thingys">
            <div class="thingy">
                <h2 style="margin-top: 20px;">Tab Customizer</h2>
                <form onsubmit="return false;" style="display: flex; flex-direction: column;">
                    <input type="text" placeholder="Title" onkeyup="setTitle(this.value)" class="form">
                    <input type="text" placeholder="Icon" onkeyup="setfavicon(this.value.trim())" class="form">
                </form>
            </div>
            <div class="thingy">
                <h2 style="margin-top: 20px;">Media Chooser</h2>
                <form onsubmit="return false;" style="display: flex; flex-direction: column;">
                    <button onclick="setmedia(null)">Normal Movies</button>
                    <button onclick="setmedia('yes')">My Collection</button>
                </form>
            </div>
            <div class="thingy">
                <h2 style="margin-top: 20px;">Panic System</h2>
                <form style="display: flex; flex-direction: column;"">
                    <input type="text" placeholder="button" onkeyup="setpanicbutton(this.value)" class="form" id="3"></input>
                    <input type="text" placeholder="link (remember https://)" onkeyup="setpaniclink(this.value)" class="form" id="4"></input>
                </form>
            </div>
        </div>
        <script>function setfavicon(icon) {document.querySelector("link[rel='icon']").href = icon; localStorage.setItem("favicon", icon);}</script>
        <script>document.addEventListener('DOMContentLoaded', () => {localStorage.setItem("panicbutton", null); localStorage.setItem("paniclink", null)})</script>
        <script>function setTitle(value) {document.title = value || "Google"; localStorage.setItem("title", value)};</script>
        <script>function setmedia(value) {localStorage.setItem("media", value)};</script>
        <script>function setpanicbutton(value) {localStorage.setItem("panicbutton", null); localStorage.setItem("panicbutton", value)};</script>
        <script>function setpaniclink(value) {localStorage.setItem("paniclink", null); localStorage.setItem("paniclink", value)};</script>
    </body>
